<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palace</title>
    <link rel="stylesheet" href="vid/vid.css">
</head>
<body>
    <h1><a href="https://vt.tiktok.com/ZS9jKmQsS/">Original Source</a></h1>
    <div id="container">
        <video id="vid" controls autoplay name="media" loop>
        </video>
    </div>
    <script>
        let isDebug = false;
        const video = document.getElementById("vid");

        if (isDebug) {
            document.getElementById("container").style.pointerEvents = "all";
        } else {
            document.getElementById("container").style.pointerEvents = "none";
        }
        
        const bloblink = URL.createObjectURL("vid/palace.mp4");
        video.src = bloblink;

        video.onloadeddata(() => {
            URL.revokeObjectURL(bloblink);
        });
        
        // video.src = "vid/palace.mp4";
    </script>
</body>
</html>
