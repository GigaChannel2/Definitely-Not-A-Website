<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pupue</title>
    <style>
        body{
            background-color: black;
            justify-content: center;
            align-items: center;
        }
        video{
            pointer-events: none;
            height: 80%;
            width: 80%;
            visibility: hidden;
            z-index: 0;
            display: block;
            justify-self: center;
            align-self: center;
        }
        #img{
            align-items: center;
            justify-self: center;
            z-index: 1;
            display: block;
            width: 80%;
            height: 80%;
            object-fit: contain;
            position: absolute;
        }
        #contain{
            width: 100vw;
            height: 100vh;
            max-width: 900px;
            display: block;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div id="contain">
        <img id="img" src="luckystar.jpg" alt="">
        <video id="vid" loop>
            <source src="vid/Konata_Izumi.mp4" type="video/mp4">
        </video>
    </div>
    <script>
        document.getElementById("img").addEventListener("click", () => {
            document.getElementById("vid").style.visibility = "visible";
            document.getElementById("vid").play();
            document.getElementById("img").style.visibility = "hidden";
        });
    </script>
</body>
</html>
